name: CI

on:
  push:
    branches-ignore: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  BUN_VERSION: "1.3.9"

jobs:
  quality:
    name: Lint, Type Check & Test
    if: "!contains(github.event.head_commit.message, 'skip ci')"
    runs-on: ubuntu-latest
    timeout-minutes: 10
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: personalclaw_test
          POSTGRES_USER: claw
          POSTGRES_PASSWORD: claw_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U claw -d personalclaw_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      valkey:
        image: valkey/valkey:8.1-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "valkey-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Cache Bun dependencies
        uses: actions/cache@v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate DB client
        run: bun run db:generate

      - name: Biome check (lint + format + imports)
        run: bun run check

      - name: Type check
        run: bun run check-types

      - name: Run tests
        run: bun run test
        env:
          DATABASE_URL: "postgresql://claw:claw_dev@localhost:5432/personalclaw_test"
          REDIS_URL: "redis://localhost:6379"

      - name: Build all packages
        run: bun run build
        env:
          DATABASE_URL: "postgresql://claw:claw_dev@localhost:5432/personalclaw_test"

  # Disable auto releases for now
  # release:
  #   name: Semantic Release
  #   needs: [quality]
  #   if: github.ref == 'refs/heads/main'
  #   uses: ./.github/workflows/semantic-release.yml
  #   with:
  #     is-dev-release: false
  #     skip-checks: true
  #   secrets: inherit

  dev-release:
    name: Semantic Release - Dev
    needs: [quality]
    if: |
      github.ref != 'refs/heads/main' && (
        startsWith(github.event.head_commit.message, 'feat:') ||
        startsWith(github.event.head_commit.message, 'feat(') ||
        startsWith(github.event.head_commit.message, 'fix:') ||
        startsWith(github.event.head_commit.message, 'fix(') ||
        startsWith(github.event.head_commit.message, 'refactor:') ||
        startsWith(github.event.head_commit.message, 'refactor(') ||
        startsWith(github.event.head_commit.message, 'perf:') ||
        startsWith(github.event.head_commit.message, 'perf(') ||
        startsWith(github.event.head_commit.message, 'revert:') ||
        startsWith(github.event.head_commit.message, 'revert(')
      )
    uses: ./.github/workflows/semantic-release.yml
    with:
      is-dev-release: true
      skip-checks: true
    secrets: inherit
