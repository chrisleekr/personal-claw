image: oven/bun:1.3.9-alpine

stages:
  - prepare
  - test
  - build
  - release

.feature_branch: &feature_branch
  rules:
    - if: $CI_COMMIT_BRANCH && $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH

.main_branch: &main_branch
  rules:
    - if: $CI_COMMIT_MESSAGE =~ /^chore\(release\):/
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

.cache_config: &cache_config
  key:
    files:
      - bun.lock
    prefix: ${CI_COMMIT_REF_SLUG}
  paths:
    - node_modules/
    - ~/.bun/install/cache/

.docker_variables: &docker_variables
  DOCKER_HOST: tcp://docker:2376
  DOCKER_TLS_CERTDIR: '/certs'
  DOCKER_TLS_VERIFY: 1
  DOCKER_CERT_PATH: '$DOCKER_TLS_CERTDIR/client'

.docker_before_script: &docker_before_script
  - apk add --no-cache curl git jq
  - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin $CI_REGISTRY
  - docker context create dind
  - docker buildx create --driver docker-container --use dind --buildkitd-flags '--allow-insecure-entitlement network.host'

# ---------------------------------------------------------------------------
# Prepare
# ---------------------------------------------------------------------------

dependencies:
  stage: prepare
  interruptible: true
  cache:
    <<: *cache_config
    policy: pull-push
  script:
    - bun install --frozen-lockfile

# ---------------------------------------------------------------------------
# Test (feature branches only -- main is gated by GitHub semantic-release)
# ---------------------------------------------------------------------------

lint:
  stage: test
  interruptible: true
  cache:
    <<: *cache_config
    policy: pull
  needs:
    - dependencies
  <<: *feature_branch
  script:
    - bun run check

# ---------------------------------------------------------------------------
# Build
# ---------------------------------------------------------------------------

build:
  stage: build
  cache:
    <<: *cache_config
    policy: pull
  needs:
    - dependencies
  script:
    - bun install --frozen-lockfile
    - bun run db:generate
    - bun run build
  variables:
    DATABASE_URL: 'postgresql://placeholder:placeholder@localhost:5432/placeholder'
  artifacts:
    paths:
      - apps/web/.next/
      - apps/api/dist/
      - packages/*/dist/
    expire_in: 1 hour

# ---------------------------------------------------------------------------
# Release -- Docker images
# GitHub is the single source for semantic-release. GitLab only builds Docker
# images and pushes to GitLab Container Registry.
# ---------------------------------------------------------------------------

.docker_build_template: &docker_build_template
  image: docker:27-dind
  services:
    - name: docker:27-dind
      alias: docker
  variables:
    <<: *docker_variables

publish-dev-docker-web:
  stage: release
  interruptible: true
  <<:
    - *docker_build_template
    - *feature_branch
  needs:
    - build
  before_script: *docker_before_script
  script:
    - docker buildx build --progress plain --platform linux/amd64,linux/arm64
      --allow network.host --provenance false
      --build-arg PACKAGE_VERSION=dev-${CI_COMMIT_SHORT_SHA}
      --build-arg GIT_HASH=${CI_COMMIT_SHORT_SHA}
      --build-arg NODE_ENV=production
      -f apps/web/Dockerfile
      --tag $CI_REGISTRY/chrisleekr/${CI_PROJECT_NAME}/web:dev-${CI_COMMIT_SHORT_SHA}
      --push .

publish-dev-docker-api:
  stage: release
  interruptible: true
  <<:
    - *docker_build_template
    - *feature_branch
  needs:
    - build
  before_script: *docker_before_script
  script:
    - docker buildx build --progress plain --platform linux/amd64,linux/arm64
      --allow network.host --provenance false
      --build-arg PACKAGE_VERSION=dev-${CI_COMMIT_SHORT_SHA}
      --build-arg GIT_HASH=${CI_COMMIT_SHORT_SHA}
      --build-arg NODE_ENV=production
      -f apps/api/Dockerfile
      --tag $CI_REGISTRY/chrisleekr/${CI_PROJECT_NAME}/api:dev-${CI_COMMIT_SHORT_SHA}
      --push .

publish-tag-docker-web:
  stage: release
  <<:
    - *docker_build_template
    - *main_branch
  needs:
    - build
  before_script: *docker_before_script
  script:
    - PACKAGE_VERSION=$(jq -r '.version' package.json)
    - GIT_HASH=${CI_COMMIT_SHORT_SHA}
    - docker buildx build --progress plain --platform linux/amd64,linux/arm64
      --allow network.host --provenance false
      --build-arg PACKAGE_VERSION=$PACKAGE_VERSION
      --build-arg GIT_HASH=$GIT_HASH
      --build-arg NODE_ENV=production
      -f apps/web/Dockerfile
      --tag $CI_REGISTRY/chrisleekr/${CI_PROJECT_NAME}/web:${PACKAGE_VERSION}
      --tag $CI_REGISTRY/chrisleekr/${CI_PROJECT_NAME}/web:latest
      --push .

publish-tag-docker-api:
  stage: release
  <<:
    - *docker_build_template
    - *main_branch
  needs:
    - build
  before_script: *docker_before_script
  script:
    - PACKAGE_VERSION=$(jq -r '.version' package.json)
    - GIT_HASH=${CI_COMMIT_SHORT_SHA}
    - docker buildx build --progress plain --platform linux/amd64,linux/arm64
      --allow network.host --provenance false
      --build-arg PACKAGE_VERSION=$PACKAGE_VERSION
      --build-arg GIT_HASH=$GIT_HASH
      --build-arg NODE_ENV=production
      -f apps/api/Dockerfile
      --tag $CI_REGISTRY/chrisleekr/${CI_PROJECT_NAME}/api:${PACKAGE_VERSION}
      --tag $CI_REGISTRY/chrisleekr/${CI_PROJECT_NAME}/api:latest
      --push .
